name: build

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore "IntentShell/EasyCommand.sln"

      - name: Build
        run: dotnet build "IntentShell/EasyCommand.sln" -c Release --no-restore
